<button class="tb-btn tb-btn-primary" id="dlBtn" onclick="downloadPDF()">
    <i class="bi bi-download"></i>
    <span id="dlBtnText">Download PDF</span>
</button>
<script>
async function downloadPDF() {
    const btn = document.getElementById('dlBtn');
    const btnText = document.getElementById('dlBtnText');
    btn.disabled = true;
    btnText.textContent = 'Hazırlanıyor…';
    showToast('PDF oluşturuluyor…', 12000);

    const file = (typeof lang !== "undefined" && lang === 'en') ? 'cv_en.html' : 'cv_tr.html';
    let wrapper = null;

    try {
        const res = await fetch(file);
        if (!res.ok) throw new Error('Dosya alınamadı veya bulunamadı: ' + res.status);
        const html = await res.text();

        const parsed = new DOMParser().parseFromString(html, 'text/html');
        const cvStyle  = parsed.querySelector('style');
        const container = parsed.querySelector('.container');
        if (!container) throw new Error('CV içeriği (.container) bulunamadı. cv_tr.html içeriğini kontrol edin!');

        wrapper = document.createElement('div');
        wrapper.style.cssText = 'position:fixed;top:0;left:-9999px;width:210mm;z-index:-99;';
        const s = document.createElement('style');
        s.textContent = (cvStyle ? cvStyle.textContent : '') + '\n*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}';
        wrapper.appendChild(s);
        const clone = container.cloneNode(true);
        wrapper.appendChild(clone);
        document.body.appendChild(wrapper);

        // layout için 2 frame bekleme
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

        await html2pdf()
            .set({
                margin: 0,
                filename: 'sahinbolukbasi.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    logging: false,
                    backgroundColor: '#ffffff',
                    width: clone.offsetWidth  || 794,
                    height: clone.offsetHeight || 1123
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            })
            .from(clone)
            .save();

        showToast('sahinbolukbasi.pdf başarıyla indirildi!');
    } catch (err) {
        showToast('Hata: ' + err.message);
        alert('CV PDF indirilemedi: ' + err.message);
        console.error('PDF error:', err);
    } finally {
        if (wrapper && wrapper.parentNode) wrapper.parentNode.removeChild(wrapper);
        btn.disabled = false;
        btnText.textContent = 'Download PDF';
    }
}
</script>
